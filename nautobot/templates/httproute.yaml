
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: "{{ .Release.Name }}"
spec:
  parentRefs:
    - name: "{{ .Release.Name }}"
  hostnames:
    - "nautobot.breeze-blocks.net"
  rules:
    - matches:
      - path:
          type: PathPrefix
          value: "/"
      backendRefs:
        - name: {{ .Release.Name }}
          port: 8000
          weight: 1
