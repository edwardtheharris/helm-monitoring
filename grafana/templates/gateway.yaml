---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: grafana
  labels:
    app.kubernetes.io/name: grafana
  annotations:
    cert-manager.io/cluster-issuer: comms-svc-int
    cert-manager.io/common-name: grafana.breeze-blocks.net
    cert-manager.io/usages: key agreement,digital signature, server auth
spec:
  gatewayClassName: eg
  listeners:
    - name: grafana
      hostname: grafana.breeze-blocks.net
      port: 443
      protocol: HTTPS
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
          - name: grafana-tls

