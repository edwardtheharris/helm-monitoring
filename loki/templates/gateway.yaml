---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/component: http-routing
  annotations:
    cert-manager.io/cluster-issuer: comms-svc-int
    cert-manager.io/common-name: loki.breeze-blocks.net
    cert-manager.io/usages: key agreement,digital signature, server auth
spec:
  gatewayClassName: eg
  listeners:
    - allowedRoutes:
        namespaces:
          from: All
      hostname: loki.breeze-blocks.net
      name: http
      port: 80
      protocol: HTTP
    - allowedRoutes:
        namespaces:
          from: All
      hostname: loki.breeze-blocks.net
      name: https
      protocol: HTTPS
      port: 443
      tls:
        certificateRefs:
        - group: ""
          kind: Secret
          name: loki-tls
        mode: Terminate


